<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title data-i18n-content="optionsPageTitle"></title>
  <script src="options.js" type="module"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 32px;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
      min-width: 600px;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-header img {
      width: 52px;
      height: 52px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
    }

    .page-header p {
      margin: 4px 0 0;
      color: #64748b;
      font-size: 13px;
    }

    /* Sections */
    .section {
      background: white;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    /* Connections table */
    .connections-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .connections-header h2 {
      margin: 0;
      padding: 0;
      border: none;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-weight: 600;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    #accounts-table td:last-child,
    #connections-table td:last-child {
      text-align: right;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #fafbfc;
    }

    .server-url {
      color: #64748b;
      font-size: 12px;
      font-family: monospace;
    }

    .addon-name {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 2px;
    }

    .revoke-btn {
      padding: 4px 12px;
      background: #fff;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .revoke-btn:hover {
      background: #fef2f2;
    }

    .edit-btn {
      padding: 4px 12px;
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #475569;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s;
      margin-right: 6px;
    }

    .edit-btn:hover {
      background: #f1f5f9;
    }

    .add-btn {
      padding: 6px 14px;
      background: #2563eb;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .add-btn:hover {
      background: #1d4ed8;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #94a3b8;
    }

    .empty-state svg {
      display: block;
      margin: 0 auto 12px;
    }

    .notice {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #78350f;
      line-height: 1.5;
    }

    .notice svg {
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Add-account popover */
    #add-account-popover {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px 28px;
      background: white;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      width: 420px;
      position: fixed;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
      margin: 0;
    }

    #add-account-popover::backdrop {
      background: rgba(0, 0, 0, 0.25);
    }

    .popover-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
    }

    .popover-close:hover {
      color: #475569;
    }

    #add-account-popover h3 {
      margin: 0 0 18px;
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
    }

    #add-account-popover label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #334155;
    }

    #add-account-popover input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      font-family: inherit;
    }

    #add-account-popover input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #bfdbfe;
    }

    #add-account-popover .row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    #add-account-popover .row.row-right {
      justify-content: flex-end;
    }

    #add-account-popover button.cancel {
      background: #dc2626;
      color: #fff;
      border: none;
    }

    #add-account-popover button.cancel:hover:not(:disabled) {
      background: #b91c1c;
    }

    #add-account-popover button {
      padding: 6px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #add-account-popover button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    #add-account-popover button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #add-account-popover button.secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    #add-account-popover button.secondary:hover:not(:disabled) {
      background: #e2e8f0;
    }

    #add-account-popover .aa-hint {
      font-size: 11px;
      color: #94a3b8;
      margin: -8px 0 12px;
    }

    #aa-status {
      font-size: 12px;
      min-height: 16px;
      margin-top: 4px;
      margin-bottom: 8px;
      overflow-wrap: break-word;
    }

    #aa-status.ok    { color: #16a34a; }
    #aa-status.error { color: #dc2626; }
    #aa-status.info  { color: #2563eb; }
  </style>
</head>

<body>
  <div class="page">

    <div class="page-header">
      <img src="../logo/logo_64.png" alt="" />
      <div>
        <h1 data-i18n-content="optionsPageTitle"></h1>
        <p data-i18n-content="optionsPageSubtitle"></p>
      </div>
    </div>

    <div class="section">
      <div class="connections-header">
        <h2 data-i18n-content="optionsAccountsHeading"></h2>
        <button id="add-account-btn" class="add-btn" data-i18n-content="optionsBtnAddAccount"></button>
      </div>
      <div class="table-wrap">
        <table id="accounts-table">
          <thead>
            <tr>
              <th data-i18n-content="optionsThAccount"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="accounts-body">
            <!-- populated by options.js -->
          </tbody>
        </table>
      </div>
      <div id="accounts-empty-state" class="empty-state" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <span data-i18n-content="optionsAccountsEmpty"></span>
      </div>
      <div class="notice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span data-i18n-content="optionsAccountNotice"></span>
      </div>
    </div>

    <div class="section">
      <div class="connections-header">
        <h2 data-i18n-content="optionsGrantedHeading"></h2>
      </div>
      <div class="table-wrap">
        <table id="connections-table">
          <thead>
            <tr>
              <th data-i18n-content="optionsThConnection"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="connections-body">
            <!-- populated by options.js -->
          </tbody>
        </table>
      </div>
      <div id="empty-state" class="empty-state" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <span data-i18n-content="optionsEmptyState"></span>
      </div>
      <div class="notice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span data-i18n-content="optionsNotice"></span>
      </div>
    </div>

  </div>

  <!-- Add account popover -->
  <div id="add-account-popover" popover="manual">
    <h3 data-i18n-content="optionsAddAccountTitle"></h3>

    <label for="aa-name" data-i18n-content="optionsLabelAccountName"></label>
    <input id="aa-name" type="text" data-i18n-placeholder="optionsPlaceholderAccountName" />

    <label for="aa-server" data-i18n-content="setupLabelServer"></label>
    <input id="aa-server" type="url" data-i18n-placeholder="setupPlaceholderServer"
      autocomplete="off" spellcheck="false" />

    <label for="aa-username" data-i18n-content="setupLabelUsername"></label>
    <input id="aa-username" type="text" autocomplete="username" />

    <label for="aa-password" data-i18n-content="setupLabelPassword"></label>
    <input id="aa-password" type="password" autocomplete="current-password" />

    <label for="aa-poll" data-i18n-content="configLabelPollInterval"></label>
    <input id="aa-poll" type="number" min="0" max="3600" step="10" />
    <p class="aa-hint" data-i18n-content="configHintPollInterval"></p>

    <div id="aa-status"></div>

    <div class="row row-right" style="margin-top: 12px;">
      <button id="aa-test-btn" data-i18n-content="optionsBtnAddAccount"></button>
      <button class="cancel" id="aa-cancel-btn" data-i18n-content="setupBtnCancel"></button>
    </div>
  </div>

</body>

</html>
